       .col{
        padding: 1rem;
        background-color: #408dda;
        border:1px solid #ffffff;
        color: #f7f7f7;
        text-align: center;

       }
       .col:hover{
        background-color: #007bff;
        cursor: pointer;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
       }
    </style>
  </head>
  <body>
<div class="container  border ">
  <div class="row">
    <div class="col col-lg-8 col-md-6 ">col 1</div>
    <div class="col col-lg-4 col-md-4 ">col 2</div>
    <div class="col col-lg-4 col-md-4 ">col 2</div>
     <div class="col col-lg-8 col-md-6 ">col 1</div>

  </div>
</div><div class="container text-center">
  <div class="row">
    <div class="col">
      1 of 2
    </div>
    <div class="col">
      2 of 2
    </div>
  </div>
  <div class="row">
    <div class="col">
      1 of 4
    </div>
    <div class="col">
      2 of 4
    </div>
    <div class="col">
      3 of 4
    </div>
    <div class="col">
      4 of 4
    </div>
  </div>
</div>
<div class="container text-center">
  <!-- Stack the columns on mobile by making one full-width and the other half-width -->
  <div class="row">
    <div class="col col-md-8">.col-md-8</div>
    <div class="col col-6 col-md-4">.col-6 .col-md-4</div>
  </div>

  <!-- Columns start at 50% wide on mobile and bump up to 33.3% wide on desktop -->
  <div class="row">
    <div class="col col-6 col-md-4">.col-6 .col-md-4</div>
    <div class="col col-6 col-md-4">.col-6 .col-md-4</div>
    <div class="col col-6 col-md-4">.col-6 .col-md-4</div>
  </div>

  <!-- Columns are always 50% wide, on mobile and desktop -->
  <div class="row">
    <div class="col col-6">.col-6</div>
    <div class="col col-6">.col-6</div>
  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
